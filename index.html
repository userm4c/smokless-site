<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smokless — Vapes & Insumos Premium · Espinho, Portugal</title>
  <meta name="description" content="A tua loja referência em vapes e insumos premium em Espinho, Portugal. Qualidade sem compromisso." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="#home" class="logo" aria-label="Smokless">
        <img src="assets/logo.png" alt="Smokless" class="logo-img" />
      </a>

      <nav class="nav-links" id="nav-links">
        <a href="#home">Home</a>
        <a href="#produtos">Produtos</a>
        <a href="#sobre">Sobre</a>
        <a href="#contacto">Contacto</a>
      </nav>

      <a href="https://www.instagram.com/smokless_" target="_blank" rel="noopener" class="nav-instagram">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        @SMOKLESS_
      </a>

      <button class="burger" id="burger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main>

    <!-- ── HERO ── -->
    <section class="hero" id="home">
      <div class="hero-banner">
        <img src="assets/hero-banner.png" alt="Smokless — A tua loja referência em vapes e insumos premium. Espinho, Portugal." class="hero-banner-img" />
      </div>
      <div class="hero-btns">
        <a href="#produtos" class="btn btn-outline">Ver Produtos</a>
        <a href="#contacto" class="btn btn-outline">Fala Connosco</a>
      </div>
    </section>

    <!-- ── PRODUTOS ── -->
    <section class="section" id="produtos">
      <div class="section-label">Catálogo</div>
      <h2 class="section-title">PRODUTOS</h2>
      <div class="products-grid" id="products-grid">
        <!-- preenchido pelo JS -->
      </div>
    </section>

    <!-- ── SOBRE ── -->
    <section class="section section-sobre" id="sobre">
      <div class="section-label">A Nossa História</div>
      <div class="sobre-inner">
        <div class="sobre-text">
          <h2 class="section-title">SOBRE A SMOKLESS</h2>
          <div id="sobre-paragrafos"></div>
        </div>
        <div class="sobre-stats" id="sobre-stats"></div>
      </div>
    </section>

    <!-- ── CONTACTO ── -->
    <section class="section" id="contacto">
      <div class="section-label">Fala Connosco</div>
      <h2 class="section-title">CONTACTO</h2>
      <div class="contact-grid" id="contact-grid"></div>
    </section>

  </main>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <a href="#home" class="logo" aria-label="Smokless">
      <img src="assets/logo.png" alt="Smokless" class="logo-img" />
    </a>
    <span class="footer-copy">© 2026 Smokless · Espinho, Portugal</span>
  </footer>

  <!-- ── MODAL DE PRODUTO ── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Fechar">✕</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="content.js"></script>
  <script src="products.js"></script>
  <script src="main.js"></script>
</body>
</html>
